# Nginx TLS/WSS Reverse Proxy for OpenClaw Gateway
# Place in /etc/nginx/sites-available/openclaw
#
# Prereq:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#
# Then edit this file and: sudo ln -s /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx

upstream openclaw_backend {
    server 127.0.0.1:8080;  # Gateway plaintext listen address
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=openclaw_req:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=openclaw_conn:10m;

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;  # Redirect HTTP → HTTPS
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ─── TLS Certificate (via certbot / Let's Encrypt) ───
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ─── TLS Hardening ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://your-domain.com https://your-domain.com; frame-ancestors 'none'" always;

    # ─── Proxy Settings ───
    location / {
        # WebSocket upgrade (for real-time gateway protocol)
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Trust upstream proxy — pass real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;

        # Buffers
        proxy_buffering off;
        proxy_request_buffering off;

        # Connection limits
        limit_req zone=openclaw_req burst=50 nodelay;
        limit_conn openclaw_conn 20;
    }

    # Health check (no auth required)
    location /health {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
